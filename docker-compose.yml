services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse
    user: "${UID:-1000}:${GID:-1000}"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
